name: easy_pdf_viewer
description: A flutter plugin for handling PDF files. Works on both Android & iOS
version: 1.0.8
homepage: https://github.com/kaichii/pdf_viewer

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.1.2
  numberpicker: ^2.1.2
  path_provider:
    git:
      url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
      path: "packages/path_provider/path_provider"

dev_dependencies:
  flutter_test:
    sdk: flutter

# 强制使用 git 版本的 path_provider 以解决与 flutter_cache_manager 的依赖冲突
dependency_overrides:
  path_provider:
    git:
      url: "https://gitcode.com/openharmony-tpc/flutter_packages.git"
      path: "packages/path_provider/path_provider"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  uses-material-design: true

  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' and Android 'package' identifiers should not ordinarily
  # be modified. They are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      ohos:
        pluginClass: EasyPdfViewerPlugin
      android:
        package: dev.kaichi.easy_pdf_viewer
        pluginClass: EasyPdfViewerPlugin
      ios:
        pluginClass: EasyPdfViewerPlugin
